<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gestión de Podas — Viña</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600&display=swap');
  :root {
    --verde: #2d6a4f; --verde-claro: #52b788;
    --naranja: #f4a261; --rojo: #c1121f; --rojo-claro: #e63946;
    --fondo: #0d1b0f; --panel: #111f14; --borde: #2a3d2c;
    --texto: #d8f3dc; --texto-dim: #7aab85;
    --canvas-bg: #091409;
  }
  /* MODO CLARO */
  body.claro {
    --fondo: #f0f7f1; --panel: #ffffff; --borde: #c5dfc9;
    --texto: #1a3320; --texto-dim: #4a7c55;
    --canvas-bg: #e8f5ea;
  }
  body.claro .mini-prog-bar { background: #c5dfc9; }
  body.claro .prog-bar-wrap { background: #c5dfc9; }
  body.claro .inc-item { background: #e8f5ea; }
  body.claro #lineoTooltip { background: #ffffff; border-color: var(--verde-claro); color: var(--texto); }
  body.claro .zoom-btn { background: #e8f5ea; }
  body.claro .tool-btn { background: #e8f5ea; }
  body.claro select.podador-select { background: #e8f5ea; }
  body.claro #canvasWrap { background: var(--canvas-bg); }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { font-family:'DM Sans',sans-serif; background:var(--fondo); color:var(--texto); height:100%; overflow:hidden; touch-action:none; }
  #app { display:flex; flex-direction:column; height:100dvh; overflow:hidden; }

  /* HEADER */
  header { background:var(--panel); border-bottom:1px solid var(--borde); padding:8px 12px; display:flex; align-items:center; gap:8px; flex-shrink:0; }
  header h1 { font-family:'Bebas Neue',sans-serif; font-size:1.4rem; letter-spacing:2px; color:var(--verde-claro); white-space:nowrap; }
  .header-right { margin-left:auto; display:flex; gap:6px; align-items:center; }
  select.podador-select { background:var(--fondo); border:1px solid var(--borde); color:var(--texto); padding:5px 8px; border-radius:6px; font-family:'DM Sans',sans-serif; font-size:0.82rem; max-width:130px; }
  .btn { padding:5px 10px; border-radius:6px; border:none; font-family:'DM Sans',sans-serif; font-size:0.78rem; font-weight:600; cursor:pointer; white-space:nowrap; }
  .btn-reset  { background:#2a1a1a; color:var(--rojo-claro); border:1px solid var(--rojo); }
  .btn-export { background:var(--verde); color:white; }

  /* PANEL TABS */
  #panelToggleBar { background:var(--panel); border-bottom:1px solid var(--borde); display:flex; align-items:center; gap:4px; padding:0 10px; flex-shrink:0; }
  .toggle-tab { padding:7px 11px; font-size:0.78rem; font-family:'DM Sans',sans-serif; font-weight:600; color:var(--texto-dim); cursor:pointer; border:none; background:none; border-bottom:2px solid transparent; transition:all 0.15s; white-space:nowrap; }
  .toggle-tab.active { color:var(--verde-claro); border-bottom-color:var(--verde-claro); }
  .mini-prog { margin-left:auto; display:flex; align-items:center; gap:7px; font-size:0.78rem; color:var(--texto-dim); white-space:nowrap; }
  .mini-prog strong { color:var(--verde-claro); font-family:'Bebas Neue',sans-serif; font-size:1rem; }
  .mini-prog-bar { width:55px; height:5px; background:#1a2e1c; border-radius:10px; overflow:hidden; }
  .mini-prog-fill { height:100%; background:linear-gradient(90deg,var(--verde),var(--verde-claro)); border-radius:10px; transition:width 0.4s; }

  /* PANEL CONTENT */
  #panelContent { background:var(--panel); border-bottom:1px solid var(--borde); overflow:hidden; max-height:0; transition:max-height 0.35s ease; flex-shrink:0; }
  #panelContent.open { max-height:320px; overflow-y:auto; }
  .panel-inner { padding:12px; display:none; gap:12px; flex-wrap:wrap; }
  .panel-inner.active { display:flex; }

  .prog-box { flex:1; min-width:180px; background:var(--fondo); border:1px solid var(--borde); border-radius:8px; padding:12px; text-align:center; }
  .prog-box .big-num { font-family:'Bebas Neue',sans-serif; font-size:2.8rem; line-height:1; color:var(--verde-claro); }
  .prog-box .big-num span { font-size:1.1rem; color:var(--texto-dim); }
  .prog-box .lbl { font-size:0.68rem; color:var(--texto-dim); text-transform:uppercase; letter-spacing:1px; margin:3px 0 8px; }
  .prog-bar-wrap { background:#1a2e1c; border-radius:20px; height:8px; overflow:hidden; }
  .prog-bar-fill { height:100%; background:linear-gradient(90deg,var(--verde),var(--verde-claro)); border-radius:20px; transition:width 0.5s; }
  .prog-sub { font-size:0.68rem; color:var(--texto-dim); display:flex; justify-content:space-between; margin-top:5px; }
  .inc-box { background:var(--fondo); border:1px solid var(--borde); border-radius:8px; padding:10px; text-align:center; min-width:80px; }
  .inc-box .n { font-family:'Bebas Neue',sans-serif; font-size:2rem; color:var(--naranja); line-height:1; }
  .inc-box .l { font-size:0.68rem; color:var(--texto-dim); text-transform:uppercase; letter-spacing:1px; }

  .leyenda-panel { flex:1; min-width:160px; display:flex; flex-direction:column; gap:6px; }
  .leyenda-panel h3 { font-family:'Bebas Neue',sans-serif; letter-spacing:1px; font-size:0.85rem; color:var(--texto-dim); padding-bottom:4px; border-bottom:1px solid var(--borde); }
  .ley-item { display:flex; align-items:center; gap:8px; font-size:0.8rem; color:var(--texto-dim); }
  .ley-dot { width:20px; height:4px; border-radius:2px; flex-shrink:0; }
  .ley-circ { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
  .ley-dot.gris { background:#555; }
  .ley-dot.verde { background:#52b788; }
  .ley-circ.rojo { background:#e63946; }

  .inc-lista-panel { flex:2; min-width:200px; display:flex; flex-direction:column; gap:6px; }
  .inc-lista-panel h3 { font-family:'Bebas Neue',sans-serif; letter-spacing:1px; font-size:0.85rem; color:var(--texto-dim); padding-bottom:4px; border-bottom:1px solid var(--borde); }
  .inc-scroll { max-height:160px; overflow-y:auto; display:flex; flex-direction:column; gap:4px; }
  .inc-item { background:#0d1b0f; border:1px solid var(--borde); border-radius:5px; padding:6px 8px; font-size:0.74rem; display:flex; flex-direction:column; gap:2px; }
  .inc-top { display:flex; justify-content:space-between; align-items:center; }
  .inc-num { font-weight:600; }
  .inc-type { font-size:0.66rem; padding:2px 5px; border-radius:8px; font-weight:600; }
  .inc-type.alambre  { background:#4a0a0a; color:#e63946; }
  .inc-type.extensor { background:#4a3d00; color:#ffd166; }
  .inc-type.poste    { background:#4a2000; color:#f4a261; }
  .inc-type.tensar   { background:#2d1a4a; color:#c77dff; }
  .inc-nota    { color:var(--texto-dim); font-style:italic; }
  .inc-podador { color:var(--texto-dim); font-size:0.65rem; }
  .inc-del-btn { background:none; border:none; cursor:pointer; color:#555; font-size:0.7rem; padding:2px 4px; }

  /* TOOLBAR */
  #toolbar { background:var(--panel); border-bottom:1px solid var(--borde); padding:6px 10px; display:flex; gap:6px; align-items:center; flex-shrink:0; }
  .tool-btn { padding:8px 16px; border-radius:6px; border:1px solid var(--borde); background:var(--fondo); color:var(--texto-dim); cursor:pointer; font-size:0.84rem; font-family:'DM Sans',sans-serif; font-weight:600; transition:all 0.15s; white-space:nowrap; }
  .tool-btn.active { background:var(--verde); color:white; border-color:var(--verde); }
  .tool-btn.inc-tool.active { background:#c1121f; color:white; border-color:#c1121f; }
  .zoom-btns { margin-left:auto; display:flex; gap:4px; }
  .zoom-btn { width:36px; height:36px; border-radius:6px; border:1px solid var(--borde); background:var(--fondo); color:var(--texto); font-size:1.2rem; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .zoom-btn:active { background:var(--verde); }

  /* CANVAS */
  #canvasWrap { flex:1; overflow:hidden; position:relative; background:#091409; touch-action:none; }
  #vinaCanvas { position:absolute; top:0; left:0; cursor:grab; transform-origin:0 0; image-rendering:crisp-edges; }
  #vinaCanvas:active { cursor:grabbing; }

  /* TOAST */
  #toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#1a3320; border:1px solid var(--borde); color:var(--texto); padding:8px 20px; border-radius:20px; font-size:0.84rem; pointer-events:none; opacity:0; transition:opacity 0.3s; z-index:300; white-space:nowrap; }
  #toast.show { opacity:1; }

  #lineoTooltip {
    position: fixed;
    display: none;
    background: #1a3320;
    border: 1px solid var(--verde-claro);
    color: var(--texto);
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 0.84rem;
    line-height: 1.6;
    pointer-events: none;
    z-index: 400;
    max-width: 220px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  #lineoTooltip strong { color: var(--verde-claro); }

  /* MODAL */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.8); display:flex; align-items:flex-end; justify-content:center; z-index:200; backdrop-filter:blur(4px); }
  .modal-overlay.hidden { display:none; }
  .modal { background:var(--panel); border:1px solid var(--borde); border-radius:16px 16px 0 0; padding:20px; width:100%; max-width:500px; display:flex; flex-direction:column; gap:12px; padding-bottom:32px; }
  .modal-handle { width:40px; height:4px; background:var(--borde); border-radius:2px; margin:0 auto 4px; }
  .modal h3 { font-family:'Bebas Neue',sans-serif; letter-spacing:2px; font-size:1.2rem; color:#e63946; }
  .modal label { font-size:0.8rem; color:var(--texto-dim); display:block; margin-bottom:4px; }
  .modal select,.modal textarea { width:100%; background:var(--fondo); border:1px solid var(--borde); color:var(--texto); border-radius:8px; padding:10px 12px; font-family:'DM Sans',sans-serif; font-size:1rem; }
  .modal textarea { resize:none; height:80px; }
  .modal-btns { display:flex; gap:8px; }
  .btn-cancel  { flex:1; background:var(--fondo); color:var(--texto-dim); border:1px solid var(--borde); padding:10px; border-radius:8px; cursor:pointer; font-family:'DM Sans',sans-serif; font-size:0.9rem; }
  .btn-confirm { flex:2; background:#c1121f; color:white; border:none; padding:10px; border-radius:8px; font-weight:700; cursor:pointer; font-family:'DM Sans',sans-serif; font-size:0.9rem; }
  /* PODADORES STATS */
  .podadores-panel { flex:1; min-width:220px; display:flex; flex-direction:column; gap:6px; }
  .podadores-panel h3 { font-family:'Bebas Neue',sans-serif; letter-spacing:1px; font-size:0.85rem; color:var(--texto-dim); padding-bottom:4px; border-bottom:1px solid var(--borde); }
  .pod-row { display:flex; align-items:center; gap:8px; padding:5px 0; border-bottom:1px solid var(--borde); }
  .pod-row:last-child { border-bottom:none; }
  .pod-nombre { font-size:0.8rem; font-weight:600; color:var(--texto); min-width:80px; }
  .pod-num { font-family:'Bebas Neue',sans-serif; font-size:1.1rem; color:var(--verde-claro); min-width:28px; text-align:right; }
  .pod-bar-wrap { flex:1; height:6px; background:var(--borde); border-radius:10px; overflow:hidden; }
  .pod-bar-fill { height:100%; background:linear-gradient(90deg,var(--verde),var(--verde-claro)); border-radius:10px; transition:width 0.5s; }
  .pod-pct { font-size:0.7rem; color:var(--texto-dim); min-width:32px; text-align:right; }

  @media(min-width:768px){ .modal-overlay{align-items:center;} .modal{border-radius:12px;max-width:360px;padding-bottom:20px;} .modal-handle{display:none;} }
</style>
</head>
<body>
<div id="app">

  <header>
    <h1>🍇 PODAS</h1>
    <select class="podador-select" id="podadorSelect">
      <option value="Carmen">👤 Carmen</option>
      <option value="Luis Padre">👤 Luis Padre</option>
      <option value="Andrea">👤 Andrea</option>
      <option value="Mario">👤 Mario</option>
      <option value="Luis Hijo">👤 Luis Hijo</option>
      <option value="Elena">👤 Elena</option>
    </select>
    <div class="header-right">
      <span id="syncStatus" style="font-size:0.7rem;color:var(--texto-dim);white-space:nowrap"></span>
      <button class="btn" id="modoBtn" onclick="toggleModo()" style="background:var(--fondo);border:1px solid var(--borde);color:var(--texto);font-size:1rem;padding:5px 9px;">🌙</button>
      <button class="btn btn-reset" onclick="resetAll()">↺ Reiniciar</button>
      <button class="btn btn-export" onclick="exportarResumen()">⬇ Exportar</button>
    </div>
  </header>

  <div id="panelToggleBar">
    <button class="toggle-tab" id="tabProgreso"    onclick="togglePanel('progreso')">📊 Progreso</button>
    <button class="toggle-tab" id="tabPodadores"   onclick="togglePanel('podadores')">👥 Podadores</button>
    <button class="toggle-tab" id="tabLeyenda"     onclick="togglePanel('leyenda')">🗺 Leyenda</button>
    <button class="toggle-tab" id="tabIncidencias" onclick="togglePanel('incidencias')">⚠️ Incid.</button>
    <div class="mini-prog">
      <strong id="miniHechos">0</strong><span style="color:#3d5c3f">/301</span>
      <div class="mini-prog-bar"><div class="mini-prog-fill" id="miniBar" style="width:0%"></div></div>
      <span id="miniPct">0%</span>
    </div>
  </div>

  <div id="panelContent">
    <div class="panel-inner" id="paneProgreso">
      <div class="prog-box">
        <div class="big-num" id="numHechos">0<span>/301</span></div>
        <div class="lbl">líneos podados</div>
        <div class="prog-bar-wrap"><div class="prog-bar-fill" id="progBar" style="width:0%"></div></div>
        <div class="prog-sub"><span id="pendLabel">301 pendientes</span><span id="pctLabel">0%</span></div>
      </div>
      <div class="inc-box"><div class="n" id="numInc">0</div><div class="l">Incidencias</div></div>
    </div>
    <div class="panel-inner" id="panePodadores">
      <div class="podadores-panel">
        <h3>👥 Líneos por podador</h3>
        <div id="podadoresStats"></div>
      </div>
    </div>
    <div class="panel-inner" id="paneLeyenda">
      <div class="leyenda-panel">
        <h3>Leyenda</h3>
        <div class="ley-item"><div class="ley-dot gris"></div>Sin podar</div>
        <div class="ley-item"><div class="ley-dot verde"></div>Podado</div>
        <div class="ley-item"><div class="ley-circ" style="background:#e63946"></div>Alambre roto</div>
        <div class="ley-item"><div class="ley-circ" style="background:#ffd166"></div>Cambiar extensor</div>
        <div class="ley-item"><div class="ley-circ" style="background:#f4a261"></div>Poste roto</div>
        <div class="ley-item"><div class="ley-circ" style="background:#c77dff"></div>Tensar alambre</div>
      </div>
    </div>
    <div class="panel-inner" id="paneIncidencias">
      <div class="inc-lista-panel">
        <h3>⚠️ Incidencias registradas</h3>
        <div class="inc-scroll" id="incList">
          <div style="font-size:0.75rem;color:var(--texto-dim);padding:6px">Sin incidencias</div>
        </div>
      </div>
    </div>
  </div>

  <div id="toolbar">
    <button class="tool-btn active" id="toolMarcar" onclick="setTool('marcar')">✅ Marcar podado</button>
    <button class="tool-btn inc-tool" id="toolInc"  onclick="setTool('incidencia')">🔴 Incidencia</button>
    <div class="zoom-btns">
      <button class="zoom-btn" onclick="zoomBy(0.35)">＋</button>
      <button class="zoom-btn" onclick="zoomBy(-0.35)">－</button>
      <button class="zoom-btn" onclick="resetZoom()">⌖</button>
    </div>
  </div>

  <div id="canvasWrap">
    <canvas id="vinaCanvas"></canvas>
  </div>
</div>

<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3>🔴 Nueva Incidencia</h3>
    <div>
      <label>Tipo</label>
      <select id="incTipo">
        <option value="alambre">🔴 Alambre roto</option>
        <option value="extensor">🟡 Cambiar extensor</option>
        <option value="poste">🟠 Poste roto</option>
        <option value="tensar">🟣 Tensar alambre</option>
      </select>
    </div>
    <div>
      <label>Notas (opcional)</label>
      <textarea id="incNota" placeholder="Describe el problema..."></textarea>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="cerrarModal()">Cancelar</button>
      <button class="btn-confirm" onclick="confirmarIncidencia()">Guardar</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<div id="lineoTooltip"></div>

<script>
// ══════════════════════════════════════════════════════════════════
//  Canvas alta resolución · Zonas sin solapamiento · Firebase sync
// ══════════════════════════════════════════════════════════════════

const W = 2320, H = 4200;
const canvas = document.getElementById('vinaCanvas');
const ctx    = canvas.getContext('2d');
canvas.width = W; canvas.height = H;

const TOTAL = 301;
const PODADORES = ['Carmen','Luis Padre','Andrea','Mario','Luis Hijo','Elena'];
const FB_URL = 'https://uva-de-vida-38a5d-default-rtdb.europe-west1.firebasedatabase.app/podas.json';

// Todas las zonas con la misma anchura (1100px) y bien separadas
// Canvas más alto → más espacio entre líneos
const ZONAS = {
  R: { label:'Zona Roja',  total:33,  zoneColor:'#e63946',
       bx:30,    by:30,   bw:1100, bh:900,
       lx1:160,  lx2:1110, ly1:90,  ly2:900 },
  G: { label:'Zona Verde', total:118, zoneColor:'#52b788',
       bx:30,    by:960,  bw:1100, bh:3180,
       lx1:160,  lx2:1110, ly1:1020, ly2:4100 },
  B: { label:'Zona Azul',  total:150, zoneColor:'#4895ef',
       bx:1180,  by:30,   bw:1100, bh:4110,
       lx1:1310, lx2:2260, ly1:90,  ly2:4100 }
};

// ── Estado ────────────────────────────────────────────────────────
let lineos      = {};
let incidencias = [];
let tool        = 'marcar';
let pendingKey  = null;
let hitRadius   = {};
let modoClaro   = false;
let pendingClickCX = 0, pendingClickCY = 0;
let tipTimer    = null;
let toastTimer  = null;
let lastHash    = '';
let activePanel = null;

// ── Zoom / Pan ────────────────────────────────────────────────────
let scale = 1, panX = 0, panY = 0;

function applyTransform() {
  canvas.style.transform = `translate(${panX}px,${panY}px) scale(${scale})`;
}

function zoomBy(delta, cx, cy) {
  const wrap = document.getElementById('canvasWrap');
  if (cx === undefined) { cx = wrap.clientWidth/2; cy = wrap.clientHeight/2; }
  const ns = Math.min(Math.max(scale + delta, 0.08), 8);
  const r  = ns / scale;
  panX = cx - r*(cx - panX);
  panY = cy - r*(cy - panY);
  scale = ns;
  applyTransform();
}

function resetZoom() {
  const wrap = document.getElementById('canvasWrap');
  const s = Math.min(wrap.clientWidth/W, wrap.clientHeight/H) * 0.97;
  scale = s;
  panX  = (wrap.clientWidth  - W*s) / 2;
  panY  = (wrap.clientHeight - H*s) / 2;
  applyTransform();
}

// ── Inicializar líneos ────────────────────────────────────────────
function initLineos() {
  lineos = {};
  for (const [zid, z] of Object.entries(ZONAS)) {
    const n   = z.total;
    const gap = n > 1 ? (z.ly2 - z.ly1) / (n - 1) : 0;
    for (let i = 0; i < n; i++) {
      const key    = `${zid}_${i}`;
      const offset = zid === 'R' ? 118 : 0;
      lineos[key]  = {
        key, zona: zid, num: offset + (n - i),
        x1: z.lx1, y: z.ly1 + i*gap, x2: z.lx2,
        estado: 'pendiente', incidencias: [],
        podador: null, fecha: null
      };
    }
  }
}

function calcHitRadius() {
  for (const [zid, z] of Object.entries(ZONAS)) {
    const gap = (z.ly2 - z.ly1) / (z.total - 1 || 1);
    hitRadius[zid] = Math.min(gap / 2, 40);
  }
}

// ── Hit test ──────────────────────────────────────────────────────
function getLineoAt(cx, cy) {
  let best = null, bestDist = Infinity;
  for (const l of Object.values(lineos)) {
    const z = ZONAS[l.zona];
    if (cx < z.lx1-10 || cx > z.lx2+10 || cy < z.by || cy > z.by+z.bh) continue;
    const d = Math.abs(cy - l.y);
    if (d <= (hitRadius[l.zona]||30) && d < bestDist) { bestDist = d; best = l; }
  }
  return best;
}

// ── Color ─────────────────────────────────────────────────────────
function lineColor(l) {
  return l.estado === 'hecho' ? '#52b788' : '#666666';
}

// ── Dibujo ────────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);

  ctx.fillStyle = modoClaro ? '#c8e6c9' : '#0f2414';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = modoClaro ? '#a5d6a7' : '#0b1a0d';
  for (let ox = 0; ox < W; ox += 90) {
    for (let oy = 0; oy < H; oy += 90) {
      const jx = Math.sin(ox*7.3+oy)*22, jy = Math.cos(oy*5.7+ox)*22;
      const px2 = ox+jx, py2 = oy+jy;
      let inZ = false;
      for (const z of Object.values(ZONAS))
        if (px2>z.bx && px2<z.bx+z.bw && py2>z.by && py2<z.by+z.bh) { inZ=true; break; }
      if (!inZ) { ctx.beginPath(); ctx.arc(px2, py2, 26, 0, Math.PI*2); ctx.fill(); }
    }
  }

  for (const [zid, z] of Object.entries(ZONAS)) {
    ctx.fillStyle = modoClaro ? '#e8f5e9' : '#152e18';
    ctx.beginPath(); ctx.roundRect(z.bx, z.by, z.bw, z.bh, 18); ctx.fill();
    ctx.strokeStyle = z.zoneColor+'88'; ctx.lineWidth = 5; ctx.setLineDash([24,14]);
    ctx.beginPath(); ctx.roundRect(z.bx, z.by, z.bw, z.bh, 18); ctx.stroke();
    ctx.setLineDash([]);
    const hechos = Object.values(lineos).filter(l=>l.zona===zid && l.estado==='hecho').length;
    const pct = Math.round(hechos/z.total*100);
    ctx.fillStyle = z.zoneColor;
    ctx.font = 'bold 32px DM Sans'; ctx.textAlign = 'left';
    ctx.fillText(`${z.label}  ·  ${hechos}/${z.total}  (${pct}%)`, z.bx+24, z.by+44);
  }

  for (const l of Object.values(lineos)) {
    const { x1, y, x2 } = l;
    if (l.estado === 'hecho') {
      ctx.save();
      ctx.shadowColor='#52b788'; ctx.shadowBlur=18;
      ctx.strokeStyle='#52b788'; ctx.lineWidth=6;
      ctx.beginPath(); ctx.moveTo(x1,y); ctx.lineTo(x2,y); ctx.stroke();
      ctx.restore();
    } else {
      ctx.strokeStyle='#555555'; ctx.lineWidth=4; ctx.shadowBlur=0;
      ctx.beginPath(); ctx.moveTo(x1,y); ctx.lineTo(x2,y); ctx.stroke();
    }
    const zz  = ZONAS[l.zona];
    const gap  = (zz.ly2-zz.ly1) / (zz.total-1||1);
    const fs   = Math.min(Math.max(gap*0.55, 10), 16);
    ctx.fillStyle = l.estado==='hecho' ? 'rgba(82,183,136,0.85)' : 'rgba(160,160,160,0.65)';
    ctx.font = `bold ${fs}px DM Sans`; ctx.textAlign = 'right';
    ctx.fillText(l.num, x1-8, y + fs*0.35);
  }

  const INC_COLORS = { alambre:'#e63946', extensor:'#ffd166', poste:'#f4a261', tensar:'#c77dff' };

  for (const l of Object.values(lineos)) {
    for (const inc of l.incidencias) {
      const ix  = inc.cx !== undefined ? inc.cx : l.x1+(l.x2-l.x1)*0.5;
      const iy  = inc.cy !== undefined ? inc.cy : l.y;
      const col = INC_COLORS[inc.tipo] || '#e63946';
      ctx.save();
      ctx.shadowColor = col; ctx.shadowBlur = 14;
      ctx.fillStyle   = col;
      ctx.beginPath(); ctx.arc(ix, iy, 18, 0, Math.PI*2); ctx.fill();
      ctx.restore();
      ctx.fillStyle = 'white'; ctx.font = 'bold 18px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('!', ix, iy+6);
    }
  }

  updateStats();
}

// ── Tooltip ───────────────────────────────────────────────────────
function showLineoInfo(l, screenX, screenY) {
  const z   = ZONAS[l.zona];
  const tip = document.getElementById('lineoTooltip');
  let html  = `<strong>${z.label} · Líneo ${l.num}</strong>`;
  if (l.estado === 'hecho') {
    html += `<br>✅ Podado por <strong>${l.podador}</strong>`;
    if (l.fecha) html += `<br>🕐 ${l.fecha}`;
  } else {
    html += `<br>⬜ Sin podar`;
  }
  if (l.incidencias.length > 0) {
    const lab      = {alambre:'Alambre roto', extensor:'Cambiar extensor', poste:'Poste roto', tensar:'Tensar alambre'};
    const dotColor = {alambre:'🔴', extensor:'🟡', poste:'🟠', tensar:'🟣'};
    l.incidencias.forEach(inc => {
      html += `<br>${dotColor[inc.tipo]||'🔴'} ${lab[inc.tipo]||inc.tipo}${inc.nota ? ': '+inc.nota : ''}`;
    });
  }
  tip.innerHTML = html;
  tip.style.display = 'block';
  let left = screenX + 12, top = screenY - 50;
  if (left + 210 > window.innerWidth) left = screenX - 220;
  if (top < 0) top = screenY + 12;
  tip.style.left = left + 'px'; tip.style.top = top + 'px';
  clearTimeout(tipTimer);
  tipTimer = setTimeout(() => tip.style.display='none', 3000);
}

function hideTooltip() {
  document.getElementById('lineoTooltip').style.display = 'none';
}

// ── Toast ─────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ── Click handler ─────────────────────────────────────────────────
function handleClick(cx, cy) {
  const l = getLineoAt(cx, cy);
  if (!l) return;
  if (tool === 'marcar') {
    l.estado = l.estado==='hecho' ? 'pendiente' : 'hecho';
    if (l.estado === 'hecho') {
      l.podador = document.getElementById('podadorSelect').value;
      l.fecha   = new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
      showToast(`✅ ${ZONAS[l.zona].label} · Líneo ${l.num} — Podado`);
    } else {
      l.podador = null; l.fecha = null;
      showToast(`⬜ ${ZONAS[l.zona].label} · Líneo ${l.num} — Desmarcado`);
    }
    saveState(); draw();
  } else {
    pendingKey     = l.key;
    pendingClickCX = cx;
    pendingClickCY = cy;
    document.getElementById('modalOverlay').classList.remove('hidden');
  }
}

// ── Touch ─────────────────────────────────────────────────────────
const wrap = document.getElementById('canvasWrap');
let isPanning=false, touchMoved=false, lastPanX=0, lastPanY=0;
let touchStartTime=0, touchTapX=0, touchTapY=0;
let lastPinchDist=null, longPressTimer=null, longPressFired=false;

function pinchDist(e) {
  const dx = e.touches[0].clientX - e.touches[1].clientX;
  const dy = e.touches[0].clientY - e.touches[1].clientY;
  return Math.sqrt(dx*dx + dy*dy);
}

wrap.addEventListener('touchstart', e => {
  e.preventDefault();
  if (e.touches.length === 1) {
    isPanning=true; touchMoved=false; longPressFired=false;
    touchStartTime=Date.now();
    lastPanX=e.touches[0].clientX; lastPanY=e.touches[0].clientY;
    touchTapX=e.touches[0].clientX; touchTapY=e.touches[0].clientY;
    lastPinchDist=null;
    longPressTimer = setTimeout(() => {
      if (!touchMoved) {
        longPressFired = true;
        const r  = wrap.getBoundingClientRect();
        const cx = (touchTapX-r.left-panX)/scale;
        const cy = (touchTapY-r.top -panY)/scale;
        const l  = getLineoAt(cx, cy);
        if (l) showLineoInfo(l, touchTapX, touchTapY);
      }
    }, 350);
  } else if (e.touches.length === 2) {
    clearTimeout(longPressTimer);
    isPanning=false; touchMoved=true; longPressFired=false;
    lastPinchDist = pinchDist(e);
  }
},{ passive:false });

wrap.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 2) {
    clearTimeout(longPressTimer);
    const d = pinchDist(e);
    if (lastPinchDist !== null) {
      const r  = wrap.getBoundingClientRect();
      const mx = (e.touches[0].clientX+e.touches[1].clientX)/2 - r.left;
      const my = (e.touches[0].clientY+e.touches[1].clientY)/2 - r.top;
      zoomBy((d-lastPinchDist)*0.012, mx, my);
    }
    lastPinchDist = d; return;
  }
  if (!isPanning || e.touches.length !== 1) return;
  const dx = e.touches[0].clientX-lastPanX, dy = e.touches[0].clientY-lastPanY;
  if (Math.abs(dx)>3 || Math.abs(dy)>3) { touchMoved=true; clearTimeout(longPressTimer); }
  panX+=dx; panY+=dy;
  lastPanX=e.touches[0].clientX; lastPanY=e.touches[0].clientY;
  applyTransform();
},{ passive:false });

wrap.addEventListener('touchend', e => {
  e.preventDefault();
  clearTimeout(longPressTimer);
  lastPinchDist = null;
  if (!longPressFired && !touchMoved && e.changedTouches.length===1 && (Date.now()-touchStartTime)<400) {
    const r  = wrap.getBoundingClientRect();
    const cx = (touchTapX-r.left-panX)/scale;
    const cy = (touchTapY-r.top -panY)/scale;
    handleClick(cx, cy);
  }
  isPanning = false;
},{ passive:false });

// ── Mouse ─────────────────────────────────────────────────────────
let mousePanning=false, mouseMoved=false, lastMX=0, lastMY=0;

wrap.addEventListener('mousedown', e => {
  mousePanning=true; mouseMoved=false; lastMX=e.clientX; lastMY=e.clientY;
});
wrap.addEventListener('mousemove', e => {
  if (mousePanning) {
    const dx=e.clientX-lastMX, dy=e.clientY-lastMY;
    if (Math.abs(dx)>2||Math.abs(dy)>2) mouseMoved=true;
    panX+=dx; panY+=dy; lastMX=e.clientX; lastMY=e.clientY;
    applyTransform(); hideTooltip(); return;
  }
  const r  = wrap.getBoundingClientRect();
  const cx = (e.clientX-r.left-panX)/scale, cy = (e.clientY-r.top-panY)/scale;
  const l  = getLineoAt(cx, cy);
  if (l) { showLineoInfo(l, e.clientX, e.clientY); wrap.style.cursor='pointer'; }
  else   { hideTooltip(); wrap.style.cursor='grab'; }
});
wrap.addEventListener('mouseup', e => {
  if (!mouseMoved) {
    const r  = wrap.getBoundingClientRect();
    const cx = (e.clientX-r.left-panX)/scale, cy = (e.clientY-r.top-panY)/scale;
    handleClick(cx, cy);
  }
  mousePanning=false;
});
wrap.addEventListener('mouseleave', () => { mousePanning=false; hideTooltip(); });
wrap.addEventListener('wheel', e => {
  e.preventDefault();
  const r = wrap.getBoundingClientRect();
  zoomBy(e.deltaY<0?0.2:-0.2, e.clientX-r.left, e.clientY-r.top);
},{ passive:false });

// ── Modal ─────────────────────────────────────────────────────────
function cerrarModal() {
  document.getElementById('modalOverlay').classList.add('hidden');
  pendingKey = null;
}

function confirmarIncidencia() {
  if (!pendingKey) return;
  const tipo    = document.getElementById('incTipo').value;
  const nota    = document.getElementById('incNota').value.trim();
  const podador = document.getElementById('podadorSelect').value;
  const l = lineos[pendingKey];
  const inc = {
    id: Date.now(), lineoKey: pendingKey,
    zona: l.zona, lineoNum: l.num, tipo, nota, podador,
    cx: pendingClickCX, cy: pendingClickCY,
    fecha: new Date().toLocaleDateString('es-ES')+' '+
           new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'})
  };
  l.incidencias.push(inc); incidencias.push(inc);
  document.getElementById('incNota').value = '';
  cerrarModal(); saveState(); draw();
  showToast(`🔴 Incidencia en ${ZONAS[l.zona].label} · L${l.num}`);
}

// ── Lista incidencias ─────────────────────────────────────────────
function renderInc() {
  const el = document.getElementById('incList');
  if (!incidencias.length) {
    el.innerHTML='<div style="font-size:0.75rem;color:var(--texto-dim);padding:6px">Sin incidencias</div>'; return;
  }
  const lab = {alambre:'Alambre roto', extensor:'Cambiar extensor', poste:'Poste roto', tensar:'Tensar alambre'};
  el.innerHTML = incidencias.map(inc => `
    <div class="inc-item">
      <div class="inc-top">
        <span class="inc-num">${ZONAS[inc.zona].label.replace('Zona ','')} L${inc.lineoNum}</span>
        <span class="inc-type ${inc.tipo}">${lab[inc.tipo]}</span>
        <button class="inc-del-btn" onclick="eliminarInc(${inc.id})">✕</button>
      </div>
      ${inc.nota?`<div class="inc-nota">"${inc.nota}"</div>`:''}
      <div class="inc-podador">${inc.podador} · ${inc.fecha}</div>
    </div>`).join('');
}

function eliminarInc(id) {
  const inc = incidencias.find(i=>i.id===id); if (!inc) return;
  incidencias = incidencias.filter(i=>i.id!==id);
  const l = lineos[inc.lineoKey];
  if (l) l.incidencias = l.incidencias.filter(i=>i.id!==id);
  saveState(); draw();
}

// ── Podadores stats ───────────────────────────────────────────────
function renderPodadores() {
  const el = document.getElementById('podadoresStats');
  if (!el) return;
  const hechos   = Object.values(lineos).filter(l=>l.estado==='hecho');
  const maxN     = Math.max(...PODADORES.map(p=>hechos.filter(l=>l.podador===p).length), 1);
  el.innerHTML   = PODADORES.map(p => {
    const n    = hechos.filter(l=>l.podador===p).length;
    const pct  = Math.round(n/TOTAL*100);
    const barW = Math.round(n/maxN*100);
    return `<div class="pod-row">
      <span class="pod-nombre">${p}</span>
      <span class="pod-num">${n}</span>
      <div class="pod-bar-wrap"><div class="pod-bar-fill" style="width:${barW}%"></div></div>
      <span class="pod-pct">${pct}%</span>
    </div>`;
  }).join('');
}

// ── Stats ─────────────────────────────────────────────────────────
function updateStats() {
  const hechos = Object.values(lineos).filter(l=>l.estado==='hecho').length;
  const pend   = TOTAL - hechos;
  const pct    = Math.round(hechos/TOTAL*100);
  document.getElementById('numHechos').innerHTML = `${hechos}<span>/${TOTAL}</span>`;
  document.getElementById('progBar').style.width = pct+'%';
  document.getElementById('pendLabel').textContent = `${pend} pendientes`;
  document.getElementById('pctLabel').textContent  = pct+'%';
  document.getElementById('numInc').textContent    = incidencias.length;
  document.getElementById('miniHechos').textContent = hechos;
  document.getElementById('miniBar').style.width    = pct+'%';
  document.getElementById('miniPct').textContent    = pct+'%';
  renderInc();
  renderPodadores();
}

// ── Panel ─────────────────────────────────────────────────────────
const TABS    = {progreso:'paneProgreso', podadores:'panePodadores', leyenda:'paneLeyenda', incidencias:'paneIncidencias'};
const TABBTN  = {progreso:'tabProgreso',  podadores:'tabPodadores',  leyenda:'tabLeyenda',  incidencias:'tabIncidencias'};

function togglePanel(name) {
  const content = document.getElementById('panelContent');
  if (activePanel === name) {
    content.classList.remove('open');
    document.getElementById(TABBTN[name]).classList.remove('active');
    activePanel = null; return;
  }
  Object.values(TABS).forEach(id   => document.getElementById(id).classList.remove('active'));
  Object.values(TABBTN).forEach(id => document.getElementById(id).classList.remove('active'));
  document.getElementById(TABS[name]).classList.add('active');
  document.getElementById(TABBTN[name]).classList.add('active');
  content.classList.add('open');
  activePanel = name;
}

// ── Herramienta ───────────────────────────────────────────────────
function setTool(t) {
  tool = t;
  document.getElementById('toolMarcar').classList.toggle('active', t==='marcar');
  document.getElementById('toolInc').classList.toggle('active',    t==='incidencia');
}

// ── Modo claro / oscuro ───────────────────────────────────────────
function toggleModo() {
  modoClaro = !modoClaro;
  document.body.classList.toggle('claro', modoClaro);
  document.getElementById('modoBtn').textContent = modoClaro ? '☀️' : '🌙';
  draw();
}

// ── Reset / Export ────────────────────────────────────────────────
function resetAll() {
  if (!confirm('¿Reiniciar todo el progreso? Afectará a todos los dispositivos.')) return;
  initLineos(); incidencias = []; saveState(); draw();
}

function exportarResumen() {
  const hechos = Object.values(lineos).filter(l=>l.estado==='hecho');
  const pend   = Object.values(lineos).filter(l=>l.estado==='pendiente');
  const pct    = Math.round(hechos.length/TOTAL*100);
  let txt = `=== RESUMEN DE PODAS ===\nFecha: ${new Date().toLocaleDateString('es-ES')}\nProgreso: ${hechos.length}/${TOTAL} (${pct}%)\n\n`;
  for (const [zid,z] of Object.entries(ZONAS)) {
    const zh=hechos.filter(l=>l.zona===zid), zp=pend.filter(l=>l.zona===zid);
    txt+=`── ${z.label} ──\nHechos (${zh.length}): ${zh.map(l=>'L'+l.num+(l.podador?' ['+l.podador+']':'')).join(', ')||'—'}\nPendientes (${zp.length}): ${zp.map(l=>'L'+l.num).join(', ')||'—'}\n\n`;
  }
  txt += `── Por podador ──\n`;
  PODADORES.forEach(p => {
    const n = hechos.filter(l=>l.podador===p).length;
    txt += `  ${p}: ${n} líneos\n`;
  });
  txt += `\n── Incidencias (${incidencias.length}) ──\n`;
  incidencias.forEach(inc=>txt+=`  ${ZONAS[inc.zona].label} · L${inc.lineoNum}: ${inc.tipo}${inc.nota?' — '+inc.nota:''} [${inc.podador}] ${inc.fecha}\n`);
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([txt],{type:'text/plain'}));
  a.download = `podas_${new Date().toISOString().slice(0,10)}.txt`; a.click();
}

// ── Firebase ──────────────────────────────────────────────────────
function setStatus(msg) {
  const el = document.getElementById('syncStatus');
  if (el) el.textContent = msg;
}

function buildSaveData() {
  return {
    lineos: Object.fromEntries(Object.entries(lineos).map(([k,l]) =>
      [k, {estado:l.estado, podador:l.podador, fecha:l.fecha, incidencias:l.incidencias}])),
    incidencias
  };
}

async function saveState() {
  const data = buildSaveData();
  try {
    await fetch(FB_URL, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data) });
  } catch(e) { showToast('⚠️ Sin conexión — guardado localmente'); }
  try { localStorage.setItem('vina_backup', JSON.stringify(data)); } catch(e){}
}

function applyData(data) {
  if (!data || !data.lineos) return;
  for (const [k,s] of Object.entries(data.lineos))
    if (lineos[k]) { lineos[k].estado=s.estado; lineos[k].podador=s.podador; lineos[k].fecha=s.fecha; lineos[k].incidencias=s.incidencias||[]; }
  incidencias = data.incidencias || [];
}

async function loadState() {
  setStatus('Conectando...');
  try {
    const res = await fetch(FB_URL);
    if (!res.ok) throw new Error();
    applyData(await res.json());
    setStatus('');
  } catch(e) {
    try { applyData(JSON.parse(localStorage.getItem('vina_backup') || 'null')); } catch(e2){}
    setStatus('Sin conexión');
  }
}

async function syncLoop() {
  try {
    const res = await fetch(FB_URL);
    if (!res.ok) return;
    const data = await res.json();
    const hash = JSON.stringify(data);
    if (hash !== lastHash && lastHash !== '') { applyData(data); draw(); }
    lastHash = hash;
  } catch(e){}
}

// ── Arranque ──────────────────────────────────────────────────────
initLineos();
calcHitRadius();
draw();
loadState().then(() => {
  draw();
  lastHash = JSON.stringify(buildSaveData());
  setInterval(syncLoop, 8000);
});
setTimeout(resetZoom, 60);
</script>
